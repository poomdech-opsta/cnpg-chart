{{- if and .Values.enabled .Values.superuser.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-cnpg-superuser-secret" .Release.Name | trunc 63 | trimSuffix "-" | quote }}
type: {{ default "kubernetes.io/basic-auth" }}
stringData:
  username: postgres
  password: {{ randAlphaNum 8 | quote }}
{{- end }}
